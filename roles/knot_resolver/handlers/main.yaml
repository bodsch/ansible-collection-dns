---

- name: restart kresd (systemd)
  listen: "restart kresd"
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop: "{{ knot_resolver_service }}"
  when:
    - ansible_facts.service_mgr | lower == 'systemd'

- name: restart kresd (openrc)
  listen: "restart kresd"
  ansible.builtin.service:
    name: kresd
    state: restarted
  when:
    - ansible_facts.service_mgr | lower == 'openrc'

- name: restart kres-cache-gc (openrc)
  listen: "restart kres-cache-gc"
  ansible.builtin.service:
    name: kres-cache-gc
    state: restarted
  when:
    - ansible_facts.service_mgr | lower == 'openrc'

...

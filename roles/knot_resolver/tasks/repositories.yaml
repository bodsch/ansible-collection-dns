---

- name: add CZ.NIC apt sources
  when:
    - ansible_facts.os_family | lower == 'debian'
  bodsch.core.apt_sources:
    name: cznic-labs-knot-resolver
    filename: cznic-labs-knot-resolver.sources
    uris:
      - https://pkg.labs.nic.cz/knot-resolver
    suites: "{{ ansible_facts.distribution_release | lower }}"
    components:
      - main
    signed_by: /usr/share/keyrings/cznic-labs-pkg.gpg
    key:
      method: download
      url: "https://pkg.labs.nic.cz/gpg"
      dest: "/usr/share/keyrings/cznic-labs-pkg.gpg"
      dearmor: true
      validate: true
    update_cache: true

- name: update package cache
  ansible.builtin.package:
    update_cache: true

...
